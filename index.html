<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>ThreatShot — Cyber Threat Intelligence for India</title>
    <meta name="description" content="ThreatShot is a cyber threat intelligence platform for Indian SMEs, NBFCs, and banks. Search CVEs, track threat feeds, scan IOCs, and stay ahead of attackers." />
    <meta name="keywords" content="cyber threat intelligence, CVE search, IOC scanner, threat feed, India cybersecurity, CVSS, CISA KEV, NVD, vulnerability database" />
    <meta name="author" content="ThreatShot" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://threatshot.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ThreatShot" />
    <meta property="og:title" content="ThreatShot — Cyber Threat Intelligence for India" />
    <meta property="og:description" content="Search CVEs, track threat feeds, scan IOCs, and stay ahead of attackers. Built for Indian security teams." />
    <meta property="og:url" content="https://threatshot.in/" />
    <meta property="og:image" content="https://threatshot.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@threatshot" />
    <meta name="twitter:title" content="ThreatShot — Cyber Threat Intelligence for India" />
    <meta name="twitter:description" content="Search CVEs, track threat feeds, scan IOCs, and stay ahead of attackers. Built for Indian security teams." />
    <meta name="twitter:image" content="https://threatshot.in/og-image.png" />

    <!-- Sitemap discovery -->
    <link rel="sitemap" type="application/xml" href="https://api.threatshot.in/sitemap.xml" />

    <!-- Organisation + WebSite structured data (static fallback for non-JS bots) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://threatshot.in/#organization",
          "name": "ThreatShot",
          "url": "https://threatshot.in",
          "logo": {
            "@type": "ImageObject",
            "url": "https://threatshot.in/favicon.svg"
          },
          "description": "Cyber threat intelligence platform for Indian SMEs, NBFCs, and fintech companies. Operated by MSInfo Services.",
          "address": { "@type": "PostalAddress", "addressCountry": "IN" }
        },
        {
          "@type": "WebSite",
          "@id": "https://threatshot.in/#website",
          "url": "https://threatshot.in",
          "name": "ThreatShot",
          "publisher": { "@id": "https://threatshot.in/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "https://threatshot.in/cve?q={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- Theme / favicon -->
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply saved theme before paint to prevent flash -->
    <script>
      (function() {
        var t = localStorage.getItem('ts-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
