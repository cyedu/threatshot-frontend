<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>ThreatShot — Cyber Threat Intelligence for India</title>
    <meta name="description" content="ThreatShot is a cyber threat intelligence platform for Indian SMEs, NBFCs, and banks. Search CVEs, track threat feeds, scan IOCs, and stay ahead of attackers." />
    <meta name="keywords" content="cyber threat intelligence, CVE search, IOC scanner, threat feed, India cybersecurity, CVSS, CISA KEV, NVD, vulnerability database" />
    <meta name="author" content="ThreatShot" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://threatshot.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ThreatShot" />
    <meta property="og:title" content="ThreatShot — Cyber Threat Intelligence for India" />
    <meta property="og:description" content="Search CVEs, track threat feeds, scan IOCs, and stay ahead of attackers. Built for Indian security teams." />
    <meta property="og:url" content="https://threatshot.com/" />
    <meta property="og:image" content="https://threatshot.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@threatshot" />
    <meta name="twitter:title" content="ThreatShot — Cyber Threat Intelligence for India" />
    <meta name="twitter:description" content="Search CVEs, track threat feeds, scan IOCs, and stay ahead of attackers. Built for Indian security teams." />
    <meta name="twitter:image" content="https://threatshot.com/og-image.png" />

    <!-- Theme / favicon -->
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply saved theme before paint to prevent flash -->
    <script>
      (function() {
        var t = localStorage.getItem('ts-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
